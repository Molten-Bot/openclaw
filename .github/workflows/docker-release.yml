name: Build & Push to Docker Hub

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    if: github.event_name == 'pull_request'
    name: Build & Push Docker Image (${{ matrix.variant }})
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: debian
            dockerfile: Dockerfile
            platforms: linux/amd64,linux/arm64
          - variant: alpine
            dockerfile: Dockerfile.alpine
            platforms: linux/amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Read OpenClaw version from OPENCLAW_VERSION
        id: openclaw_version
        run: |
          VERSION=$(tr -d '[:space:]' < OPENCLAW_VERSION)
          if [ -z "$VERSION" ]; then
            echo "OPENCLAW_VERSION not found in OPENCLAW_VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata (labels only)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: moltenai/openclaw

      - name: Build Docker image (${{ matrix.variant }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          platforms: ${{ matrix.platforms }}
          tags: moltenai/openclaw:validate-${{ steps.openclaw_version.outputs.version }}-${{ matrix.variant }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    name: Build & Push Docker Image (${{ matrix.variant }})
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: default
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: debian
            dockerfile: Dockerfile
            platforms: linux/amd64,linux/arm64
          - variant: alpine
            dockerfile: Dockerfile.alpine
            platforms: linux/amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Hub configuration
        run: |
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "secrets.DOCKERHUB_TOKEN is required."
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: moltenai
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Read OpenClaw version from OPENCLAW_VERSION
        id: openclaw_version
        run: |
          VERSION=$(tr -d '[:space:]' < OPENCLAW_VERSION)
          if [ -z "$VERSION" ]; then
            echo "OPENCLAW_VERSION not found in OPENCLAW_VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute tags for ${{ matrix.variant }}
        id: image_tags
        run: |
          set -eu

          VERSION="${{ steps.openclaw_version.outputs.version }}"
          IMAGE="moltenai/openclaw"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            RAW_TAG="${GITHUB_REF#refs/tags/}"
            STRIPPED_TAG="${RAW_TAG#v}"

            if [[ "${{ matrix.variant }}" == "debian" ]]; then
              TAGS=(
                "${IMAGE}:${RAW_TAG}"
                "${IMAGE}:${STRIPPED_TAG}"
                "${IMAGE}:${RAW_TAG}-lts"
                "${IMAGE}:${STRIPPED_TAG}-lts"
              )
            else
              TAGS=(
                "${IMAGE}:${RAW_TAG}-alpine"
                "${IMAGE}:${STRIPPED_TAG}-alpine"
              )
            fi
          else
            if [[ "${{ matrix.variant }}" == "debian" ]]; then
              TAGS=(
                "${IMAGE}:latest"
                "${IMAGE}:lts"
                "${IMAGE}:${VERSION}"
                "${IMAGE}:${VERSION}-lts"
              )
            else
              TAGS=(
                "${IMAGE}:alpine"
                "${IMAGE}:${VERSION}-alpine"
              )
            fi
          fi

          {
            echo 'tags<<EOF'
            printf '%s\n' "${TAGS[@]}"
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"

      - name: Extract Docker metadata (labels only)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: moltenai/openclaw

      - name: Build and push Docker image (${{ matrix.variant }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: ${{ matrix.platforms }}
          tags: ${{ steps.image_tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
