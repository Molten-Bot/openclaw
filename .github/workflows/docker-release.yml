name: Build & Push to Docker Hub

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    environment: default

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: moltenbot
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Read OpenClaw version from Dockerfile
        id: openclaw_version
        run: |
          VERSION=$(grep -E '^ENV OPENCLAW_VERSION=' Dockerfile | head -n1 | cut -d= -f2)
          if [ -z "$VERSION" ]; then
            echo "OPENCLAW_VERSION not found in Dockerfile"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: moltenbot/openclaw
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.openclaw_version.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
